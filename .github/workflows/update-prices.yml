name: Update Gas Prices

on:
  schedule:
    - cron: '0 14 * * 6'   # Saturday 9am CT (14:00 UTC)
    - cron: '0 14 * * 0'   # Sunday 9am CT (14:00 UTC)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch gas prices from LakeExpo
        run: python scripts/fetch_prices.py

      - name: Commit prices.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update gas prices $(date -u +%Y-%m-%d)"
          git push
